name: CI — Testes automaticos

on:
  push:
    branches: [ main, sprint03-deploy-lambda ]
  pull_request:
    branches: [ main ]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r Sprint_3/requirements.txt
          pip install pytest httpx moto

      - name: Rodar testes
        run: |
          cd Sprint_3
          pytest tests/ -v